<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>定期考查計時器 v8.5｜純粹計時版</title>
  <style>
    :root{
      /* Light Mode Variables */
      --bg: #f8fafc;
      --card-bg: rgba(255,255,255,0.95);
      --ink: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --blue: #2563eb;
      --green: #10b981;
      --red: #ef4444;
      --amber: #f59e0b;
      --purple: #8b5cf6; 
      --shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
      --radius: 20px;
      --font: system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;
      --input-bg: white;
      
      /* Clock Colors Light */
      --clock-face: white;
      --clock-border: #cbd5e1;
      --clock-mark: #64748b;
      --clock-hand: #334155;
    }

    /* Dark Mode Variables */
    body.dark-mode {
      --bg: #0f172a; 
      --card-bg: #1e293b; 
      --ink: #f1f5f9; 
      --muted: #94a3b8; 
      --line: #334155; 
      --shadow: 0 10px 30px -5px rgba(0,0,0,0.5);
      --input-bg: #0f172a;
      
      /* Clock Colors Dark */
      --clock-face: #1e293b;
      --clock-border: #475569;
      --clock-mark: #94a3b8;
      --clock-hand: #e2e8f0;
    }

    *{ box-sizing:border-box; }
    
    body {
      margin: 0; 
      font-family: var(--font); 
      color: var(--ink); 
      line-height: 1.5;
      background: var(--bg); 
      min-height: 100vh;
      overflow-x: hidden;
      display: block; 
      transition: background 0.3s, color 0.3s;
    }
    
    body:not(.dark-mode) {
        background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
    }
    
    .container { 
      max-width: 1400px; 
      margin: 0 auto; 
      padding: 20px; 
    }

    /* Header & Top Bar */
    .header{ display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 20px; flex-wrap: wrap; }
    .brand { display: flex; align-items: center; gap: 15px; }
    
    .actions { 
      display: flex; 
      gap: 8px; 
      align-items: center; 
      background: var(--card-bg); 
      padding: 5px 10px; 
      border-radius: 12px; 
      border: 1px solid var(--line);
      transition: all 0.3s ease;
    }

    #topSection.focus-active .actions > *:not(.focus-toggle) {
      display: none;
    }
    
    #topSection.focus-active .actions {
      background: transparent;
      border-color: transparent;
      padding: 0;
    }
    
    /* Controls Section */
    .control-panel {
      background: rgba(15, 23, 42, 0.05); 
      padding: 15px;
      border-radius: var(--radius);
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      align-items: flex-end;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      max-height: 500px; 
      opacity: 1;
      overflow: hidden;
    }
    body.dark-mode .control-panel {
        background: rgba(255, 255, 255, 0.05);
    }

    #topSection.focus-active .control-panel {
      max-height: 0;
      opacity: 0;
      padding-top: 0;
      padding-bottom: 0;
      margin-bottom: 0;
      border: none;
    }
    
    /* Logo */
    .logo-area { display: flex; align-items: center; justify-content: center; position: relative; }
    .school-badge { 
      height: 60px; 
      width: auto; 
      max-width: 200px;
      object-fit: contain; 
      mix-blend-mode: multiply; 
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
    }
    body.dark-mode .school-badge { mix-blend-mode: normal; }

    .title-group h1 { margin: 0; font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
    
    /* 核心狀態看板 */
    .dashboard {
      display: grid;
      grid-template-columns: 350px 1fr 1.5fr; 
      gap: 20px; 
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--card-bg);
      padding: 20px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
      text-align: center;
      transition: transform 0.2s, background 0.3s, border-color 0.3s;
    }
    .stat-card:hover { transform: translateY(-2px); }
    .stat-label { color: var(--muted); font-size: 16px; font-weight: 700; margin-bottom: 8px; display: block; }
    .stat-value { font-size: 38px; font-weight: 900; font-variant-numeric: tabular-nums; line-height: 1; color: var(--ink); }
    .stat-sub { font-size: 14px; color: var(--muted); margin-top: 5px; font-weight: 600; }

    .val-should { color: var(--ink); }
    .val-present { color: var(--green); }
    .val-absent { color: var(--red); }

    /* Main Content Layout */
    .main-grid { 
      display: grid; 
      grid-template-columns: 350px 1fr; 
      gap: 20px; 
      min-height: 600px; 
      align-items: stretch;
    }
    
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid var(--line);
      transition: background 0.3s, border-color 0.3s;
    }

    /* Left Sidebar: Schedule */
    .sidebar-card {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    #schedList {
        flex: 1; 
        overflow-y: auto;
        padding-bottom: 20px;
        min-height: 150px;
    }

    /* Right Column: Timer + Attendance */
    .right-column {
      display: flex;
      flex-direction: column;
      gap: 20px;
      height: 100%;
    }

    .timer-card-wrapper {
      flex: 1; 
      display: flex;
      flex-direction: column;
    }
    
    .timer-card-wrapper .card {
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .attendance-card-wrapper {
      flex-shrink: 0; 
    }

    .card-hd { 
        padding: 15px 20px; 
        border-bottom: 1px solid var(--line); 
        background: rgba(255,255,255,0.5); 
        display: flex; justify-content: space-between; align-items: center; 
        transition: background 0.3s;
    }
    body.dark-mode .card-hd { background: rgba(0,0,0,0.2); }

    .card-hd h2 { font-size: 18px; margin: 0; font-weight: 800; }

    /* Timer Display */
    .timer-box {
      padding: 20px;
      text-align: center;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
    }
    .timer-big {
      font-size: 220px; 
      font-weight: 900;
      line-height: 1;
      margin: 10px 0;
      font-variant-numeric: tabular-nums;
      transition: color 0.3s;
      letter-spacing: -8px;
      color: var(--ink);
    }
    .timer-status {
      display: inline-block;
      padding: 8px 24px;
      border-radius: 99px;
      font-weight: 800;
      font-size: 24px;
      margin-bottom: 10px;
    }
    .status-exam { background: #dcfce7; color: #166534; }
    .status-break { background: #fef3c7; color: #92400e; }
    .status-finish { background: #f1f5f9; color: #475569; }
    body.dark-mode .status-finish { background: #334155; color: #cbd5e1; }

    /* Progress Bar */
    .progress-container { height: 18px; background: var(--line); border-radius: 9px; overflow: hidden; margin: 30px auto; width: 90%; }
    .progress-bar { height: 100%; width: 100%; background: var(--blue); transition: width 1s linear, background 0.3s; }

    /* Attendance Grid */
    .stu-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(55px, 1fr));
      gap: 10px;
      padding: 20px;
    }
    .stu {
      aspect-ratio: 1;
      border-radius: 12px;
      border: 2px solid var(--line);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 18px; cursor: pointer; transition: 0.15s;
      background: var(--card-bg);
      color: var(--ink);
      user-select: none;
      position: relative;
    }
    .stu:hover { transform: scale(1.05); }
    .stu:active { transform: scale(0.95); }
    .stu.present { background: rgba(16, 185, 129, 0.1); border-color: var(--green); color: var(--green); }
    .stu.absent { background: rgba(239, 68, 68, 0.1); border-color: var(--red); color: var(--red); }
    
    .stu.pending {
      border-color: var(--amber);
      background: rgba(245, 158, 11, 0.1);
      color: var(--amber);
      animation: pulse 1.5s infinite;
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.2);
    }
    .stu.pending::after {
      content: '確認?';
      position: absolute;
      bottom: 2px;
      font-size: 10px;
      font-weight: 700;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.03); }
      100% { transform: scale(1); }
    }

    /* Schedule List */
    .sched-item {
      padding: 25px 30px; 
      border-bottom: 1px solid var(--line);
      display: flex; justify-content: space-between; align-items: center;
    }
    .sched-item:last-child { border-bottom: none; }
    .sched-item.active { background: rgba(37, 99, 235, 0.1); border-left: 8px solid var(--blue); }
    .sched-item.past { opacity: 0.5; background: rgba(0,0,0,0.02); }
    
    .sched-name { font-weight: 800; font-size: 32px; color: var(--ink); } 
    .sched-time { color: var(--muted); font-weight: 700; font-family: monospace; font-size: 24px; }

    /* Field Styles */
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 13px; font-weight: 800; color: var(--muted); }
    select, input {
      padding: 10px 12px; border-radius: 10px; border: 1px solid var(--line);
      font-weight: 700; font-size: 15px; outline: none;
      background: var(--input-bg);
      color: var(--ink);
    }
    select:focus, input:focus { border-color: var(--blue); ring: 2px solid rgba(37,99,235,0.2); }

    .urgent { color: var(--red) !important; animation: blink 1s infinite; }

    .btn {
      padding: 8px 14px;
      border-radius: 8px; border: none; font-weight: 800; cursor: pointer;
      transition: 0.2s;
      font-size: 14px;
      white-space: nowrap; 
    }
    .btn:active { transform: scale(0.95); }
    .btn-blue { background: var(--blue); color: white; }
    .btn-green { background: var(--green); color: white; }
    .btn-ghost { background: transparent; border: 1px solid var(--muted); color: var(--muted); }
    .btn-ghost:hover { background: rgba(100, 116, 139, 0.1); }
    
    .checkbox-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      padding: 5px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .checkbox-btn:hover { background: rgba(100, 116, 139, 0.1); }
    .checkbox-btn input {
      margin: 0;
      width: 16px;
      height: 16px;
      cursor: pointer;
      border-radius: 4px;
    }
    .checkbox-btn.focus-toggle {
        background: rgba(37, 99, 235, 0.1);
        border-color: var(--blue);
        color: var(--blue);
        transition: all 0.3s;
    }

    #logoInput { display: none; }
    
    .divider { width: 1px; height: 24px; background: var(--line); margin: 0 4px; }

    @media (max-width: 1200px) {
        .timer-big { font-size: 150px; }
        .actions { flex-wrap: wrap; justify-content: flex-end; }
    }
    @media (max-width: 1024px) {
      .dashboard { grid-template-columns: 1fr; }
      .main-grid { grid-template-columns: 1fr; }
      .container { height: auto; display: block; }
    }
  </style>
</head>
<body>

<div class="container">
  
  <!-- Top Section -->
  <div id="topSection">
    <!-- Header -->
    <div class="header">
        <div class="brand">
        <div class="logo-area">
            <img id="schoolLogo" src="logo.png" alt="校徽" class="school-badge" onerror="this.src=DEFAULT_LOGO">
        </div>
        <div class="title-group">
            <h1 id="displayDate">2024 / 01 / 01 (一)</h1>
        </div>
        </div>
        <div class="actions">
        <label class="checkbox-btn focus-toggle" title="考試時自動隱藏上方設定區">
            <input type="checkbox" id="focusModeToggle"> 
            專注模式
        </label>
        <div class="divider"></div>
        <button class="btn btn-ghost" id="btnDarkMode" onclick="toggleDarkMode()" title="切換深色模式">🌙</button>
        <button class="btn btn-ghost" id="btnFullscreen">⛶ 全螢幕</button>
        <div class="divider"></div>
        <button class="btn btn-ghost" onclick="resetAttendance()">↺ 重置出席</button>
        <button class="btn btn-ghost" style="color:var(--red); border-color: #fecaca;" onclick="clearMemory()">🧪 清除設定</button>
        </div>
    </div>

    <!-- Control Panel -->
    <div class="control-panel">
        <div class="field">
        <label>考試階段</label>
        <select id="modeSel">
            <option value="low">低年級</option>
            <option value="mid_day1">中高年級 Day 1</option>
            <option value="mid_day2">中高年級 Day 2</option>
            <option value="custom">📝 自訂 / 平常考</option>
        </select>
        </div>
        <div class="field">
        <label>班級人數</label>
        <input type="number" id="totalInput" min="1" max="60" value="25">
        </div>
        <div class="field" id="mathExtField" style="display:none">
        <label>數學延長 (分鐘)</label>
        <input type="number" id="mathExtInput" value="0" min="0" step="1" style="width: 100px;" placeholder="輸入分鐘">
        </div>

        <!-- 自訂平常考欄位 -->
        <div class="field custom-field" style="display:none">
            <label>科目名稱</label>
            <input type="text" id="customSubj" value="小考" style="width: 120px;" placeholder="例如: 國語聽寫">
        </div>
        <div class="field custom-field" style="display:none">
            <label>測驗時間 (分鐘)</label>
            <input type="number" id="customMins" value="15" min="1" style="width: 100px;">
        </div>
        <div class="field custom-field" style="display:none; justify-content: flex-end;">
            <button class="btn btn-green" onclick="startCustomQuiz()" style="padding: 10px 16px;">▶ 立即開始計時</button>
        </div>

        <div style="flex-grow:1"></div>
        <div class="field" style="align-items: flex-end;">
            <label>目前狀態</label>
            <span id="statusBadge" class="timer-status">載入中...</span>
        </div>
    </div>
  </div>

  <!-- Dashboard Stats -->
  <div class="dashboard">
    <!-- 1. Analog Clock -->
    <div class="stat-card" style="display:flex; align-items:center; justify-content:center; gap:20px;">
      <div>
        <span class="stat-label">現在時間</span>
        <div class="stat-value" id="digitalClock" style="font-family: monospace;">00:00:00</div>
        <div class="stat-sub">距離收卷/開考還有 <strong id="quickCountdown">--</strong></div>
      </div>
      <canvas id="analogClock" width="80" height="80"></canvas>
    </div>

    <!-- 2. Current Subject -->
    <div class="stat-card">
      <span class="stat-label">當前考試科目</span>
      <div class="stat-value" id="currentSubDisplay" style="color:var(--blue)">準備中</div>
      <div class="stat-sub" id="currentTimeRange">-- : -- ~ -- : --</div>
    </div>

    <!-- 3. Attendance -->
    <div class="stat-card" style="display: flex; flex-direction: row; justify-content: space-around; align-items: center;">
       <div>
         <span class="stat-label">應到</span>
         <div class="stat-value val-should" id="countShould">0</div>
       </div>
       <div style="width:1px; height:50px; background:var(--line);"></div>
       <div>
         <span class="stat-label">實到</span>
         <div class="stat-value val-present" id="countPresent">0</div>
       </div>
       <div style="width:1px; height:50px; background:var(--line);"></div>
       <div>
         <span class="stat-label">缺考</span>
         <div class="stat-value val-absent" id="countAbsent">0</div>
       </div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-grid">
    <!-- Left Sidebar: Schedule -->
    <div class="card sidebar-card">
      <div class="card-hd">
        <h2>考試日程</h2>
      </div>
      <div id="schedList">
        <!-- JS generates list -->
      </div>
    </div>

    <!-- Right Column: Timer & Attendance -->
    <div class="right-column">
      <div class="timer-card-wrapper">
        <div class="card">
            <div class="timer-box">
            <div id="timerLabel" style="font-weight:800; color:var(--muted); font-size: 24px; letter-spacing: 2px;">剩餘時間</div>
            <div class="timer-big" id="timerBig">00:00</div>
            <span id="statusBadge2" class="timer-status" style="display:none"></span>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            </div>
        </div>
      </div>

      <div class="attendance-card-wrapper">
        <div class="card">
            <div class="card-hd">
            <h2>學生座號方塊 (雙擊變更狀態)</h2>
            <span style="font-size:13px; color:var(--muted)">※ 預設全出席</span>
            </div>
            <div class="stu-grid" id="stuGrid"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const KEY = "exam_timer_v8_data";
  const DEFAULT_LOGO = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjMjU2M2ViIiBzdHJva2Utd2lkdGg9IjIiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIgc3Ryb2tlLWxpbmVqb2luPSJyb3VuZCI+PHBhdGggZD0iTTEyIDJNOSA0LjlWMTdMMTIgMjJsLTktNC45Vjd6Ii8+PHBhdGggZD0iTTIyIDdMMTIgMjJsLTUtMi41Ii8+PHBhdGggZD0iTTEyIDEydjEwIi8+PC9zdmc+";

  const state = {
    mode: 'mid_day2',
    total: 25, 
    mathExt: 0,
    present: [],
    selectionIndex: null,
    focusMode: false,
    darkMode: false,
    customSchedule: [] 
  };

  function $(id) { return document.getElementById(id); }

  // --- Core App Logic ---
  function loadData() {
    const saved = localStorage.getItem(KEY);
    if (saved) {
      try {
        const data = JSON.parse(saved);
        state.mode = data.mode || 'mid_day2';
        state.total = parseInt(data.total) || 25;
        state.mathExt = parseInt(data.mathExt) || 0;
        state.focusMode = data.focusMode || false; 
        state.darkMode = data.darkMode || false;
        state.customSchedule = data.customSchedule || [];
        
        if (data.present && Array.isArray(data.present)) {
            state.present = data.present;
        } else {
            state.present = [];
        }
      } catch(e) { console.error("Data load error", e); }
    }
    syncUI();
  }

  function saveData() {
    try {
        localStorage.setItem(KEY, JSON.stringify(state));
    } catch (e) {
        console.error("Save error", e);
    }
  }

  function syncUI() {
    $('modeSel').value = state.mode;
    $('totalInput').value = state.total;
    $('mathExtInput').value = state.mathExt;
    
    // Toggle Fields based on Mode
    const isCustom = state.mode === 'custom';
    $('mathExtField').style.display = (state.mode === 'mid_day2') ? 'flex' : 'none';
    document.querySelectorAll('.custom-field').forEach(el => {
        el.style.display = isCustom ? 'flex' : 'none';
    });
    
    $('focusModeToggle').checked = state.focusMode; 
    if (state.darkMode) {
        document.body.classList.add('dark-mode');
        $('btnDarkMode').textContent = '☀️';
    } else {
        document.body.classList.remove('dark-mode');
        $('btnDarkMode').textContent = '🌙';
    }

    renderAttendance();
  }

  function toggleDarkMode() {
      state.darkMode = !state.darkMode;
      saveData();
      syncUI();
      drawClock();
  }

  // Bind Event Listeners
  window.onload = function() {
      tryProcessLocalLogo();
      loadData();
      
      // Input Listeners
      $('modeSel').addEventListener('change', (e) => { 
          state.mode = e.target.value; 
          saveData(); 
          syncUI(); 
          tick(); 
      });
      $('totalInput').addEventListener('change', (e) => { 
          state.total = e.target.value; 
          renderAttendance(); 
          saveData(); 
      });
      $('mathExtInput').addEventListener('change', (e) => { 
          state.mathExt = e.target.value; 
          saveData(); 
          tick(); 
      });
      $('focusModeToggle').addEventListener('change', (e) => {
          state.focusMode = e.target.checked;
          saveData();
          tick();
      });

      setInterval(tick, 1000);
      tick();
  };

  // Start Custom Quiz Action
  function startCustomQuiz() {
      const subj = $('customSubj').value.trim() || '平常考';
      const mins = parseInt($('customMins').value) || 15;
      
      const nowMs = Date.now();
      const endMs = nowMs + (mins * 60 * 1000);
      
      const startD = new Date(nowMs);
      const endD = new Date(endMs);

      state.customSchedule = [{
          name: subj,
          start: formatHM(startD.getHours() * 60 + startD.getMinutes()),
          end: formatHM(endD.getHours() * 60 + endD.getMinutes()),
          exactStartMs: nowMs,
          exactEndMs: endMs
      }];
      
      state.mode = 'custom';
      saveData();
      syncUI();
      tick();
  }

  function tryProcessLocalLogo() {
      const img = $('schoolLogo');
      if (img.src.startsWith('data:')) return;
      const tempImg = new Image();
      tempImg.crossOrigin = "Anonymous";
      tempImg.onload = function() {
          try {
              const canvas = document.createElement('canvas');
              canvas.width = tempImg.width; canvas.height = tempImg.height;
              const ctx = canvas.getContext('2d'); ctx.drawImage(tempImg, 0, 0);
              const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
              const data = imgData.data; let hasWhite = false;
              for (let i = 0; i < data.length; i += 4) {
                  if (data[i] > 230 && data[i+1] > 230 && data[i+2] > 230) {
                      data[i+3] = 0; hasWhite = true;
                  }
              }
              if (hasWhite) {
                  ctx.putImageData(imgData, 0, 0);
                  img.src = canvas.toDataURL(); img.style.mixBlendMode = 'normal';
              }
          } catch (e) {}
      };
      tempImg.src = "logo.png";
  }

  function renderAttendance() {
    if (state.present.length !== parseInt(state.total)) {
      const newArr = Array.from({length: parseInt(state.total)}, (_, i) => {
          return (i < state.present.length) ? state.present[i] : true;
      });
      state.present = newArr;
    }

    const grid = $('stuGrid');
    grid.innerHTML = '';
    state.present.forEach((isP, idx) => {
      const div = document.createElement('div');
      let className = `stu ${isP ? 'present' : 'absent'}`;
      if (state.selectionIndex === idx) className += ' pending';
      div.className = className;
      div.textContent = idx + 1;
      div.title = `座號 ${idx+1}`;
      
      div.onclick = () => {
        if (state.selectionIndex === idx) {
            state.present[idx] = !state.present[idx];
            state.selectionIndex = null;
            saveData();
        } else {
            state.selectionIndex = idx;
        }
        renderAttendance(); 
      };
      grid.appendChild(div);
    });
    updateCounts();
  }

  function updateCounts() {
    const total = state.present.length;
    const present = state.present.filter(v => v).length;
    $('countShould').textContent = total;
    $('countPresent').textContent = present;
    $('countAbsent').textContent = total - present;
  }

  function resetAttendance() {
    if(!confirm("重置所有出席狀態？")) return;
    state.present = Array.from({length: state.total}, () => true);
    state.selectionIndex = null; 
    saveData();
    renderAttendance();
  }

  function clearMemory() {
    if(confirm("清除所有設定？")) {
        localStorage.removeItem(KEY);
        location.reload();
    }
  }

  function parseHM(hm) { const [h,m] = hm.split(':').map(Number); return h*60 + m; }
  function formatHM(min) { 
    const h = Math.floor(min/60); const m = min%60; 
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`; 
  }
  function getExactMin(ms) {
      const d = new Date(ms);
      return d.getHours() * 60 + d.getMinutes() + d.getSeconds() / 60;
  }

  function getSchedule() {
    if (state.mode === 'custom') return state.customSchedule || [];
    if (state.mode === 'low') {
      return [
        { name: '國語', start: '08:40', end: '09:20' },
        { name: '數學', start: '09:30', end: '10:10' }
      ];
    }
    if (state.mode === 'mid_day1') {
      return [
        { name: '國語', start: '08:40', end: '09:20' },
        { name: '英語', start: '09:30', end: '10:10' },
        { name: '自然', start: '10:30', end: '11:10' }
      ];
    }
    const ext = parseInt(state.mathExt) || 0;
    return [
      { name: '數學', start: '08:40', end: formatHM(parseHM('09:20') + ext) },
      { name: '社會', start: '10:30', end: '11:10' }
    ];
  }

  function drawClock() {
    const canvas = $('analogClock');
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    const radius = canvas.height / 2;
    ctx.resetTransform(); 
    ctx.clearRect(0, 0, canvas.width, canvas.height); 
    
    const style = getComputedStyle(document.body);
    const faceColor = style.getPropertyValue('--clock-face').trim();
    const borderColor = style.getPropertyValue('--clock-border').trim();
    const markColor = style.getPropertyValue('--clock-mark').trim();
    const handColor = style.getPropertyValue('--clock-hand').trim();

    ctx.translate(radius, radius);
    const r = radius * 0.9;

    ctx.beginPath(); ctx.arc(0, 0, r, 0, 2 * Math.PI); ctx.fillStyle = faceColor; ctx.fill();
    ctx.strokeStyle = borderColor; ctx.lineWidth = 4; ctx.stroke();

    ctx.beginPath(); ctx.arc(0, 0, 3, 0, 2 * Math.PI); ctx.fillStyle = markColor; ctx.fill();

    for(let i=0; i<12; i++) {
        const ang = i * Math.PI / 6;
        ctx.rotate(ang); ctx.translate(0, -r * 0.85);
        ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, 5);
        ctx.strokeStyle = markColor; ctx.lineWidth = 2; ctx.stroke();
        ctx.translate(0, r * 0.85); ctx.rotate(-ang);
    }

    const now = new Date();
    let hour = now.getHours() % 12;
    let minute = now.getMinutes();
    let second = now.getSeconds();

    hour = (hour*Math.PI/6) + (minute*Math.PI/(6*60)) + (second*Math.PI/(360*60));
    drawHand(ctx, hour, r*0.5, 4, handColor);
    minute = (minute*Math.PI/30) + (second*Math.PI/(30*60));
    drawHand(ctx, minute, r*0.75, 3, handColor);
    second = (second*Math.PI/30);
    drawHand(ctx, second, r*0.85, 1.5, '#ef4444');
  }

  function drawHand(ctx, pos, length, width, color) {
    ctx.beginPath(); ctx.lineWidth = width; ctx.lineCap = "round";
    ctx.strokeStyle = color; ctx.moveTo(0,0); ctx.rotate(pos);
    ctx.lineTo(0, -length); ctx.stroke(); ctx.rotate(-pos);
  }

  function tick() {
    const now = new Date();
    const nowMin = now.getHours()*60 + now.getMinutes() + now.getSeconds()/60;
    const sched = getSchedule();
    
    const days = ['日','一','二','三','四','五','六'];
    $('displayDate').textContent = `${now.getFullYear()} / ${now.getMonth()+1} / ${now.getDate()} (${days[now.getDay()]})`;
    $('digitalClock').textContent = now.toTimeString().split(' ')[0];

    drawClock();

    let current = null;
    let next = null;
    let phase = 'finish'; 

    for(let i=0; i<sched.length; i++) {
      const s = sched[i];
      const start = s.exactStartMs ? getExactMin(s.exactStartMs) : parseHM(s.start);
      const end = s.exactEndMs ? getExactMin(s.exactEndMs) : parseHM(s.end);

      if (nowMin < start) {
        if (!next) { 
            next = s; 
            phase = (i === 0 && nowMin < start) ? 'before' : 'break';
        }
      } else if (nowMin >= start && nowMin < end) {
        current = s;
        phase = 'exam';
        next = (i < sched.length - 1) ? sched[i+1] : null; 
        break; 
      } 
    }

    if (!current && !next) {
        if (sched.length > 0) {
            const lastExam = sched[sched.length-1];
            const lastEnd = lastExam.exactEndMs ? getExactMin(lastExam.exactEndMs) : parseHM(lastExam.end);
            if (nowMin >= lastEnd) {
                phase = 'finish';
            } else {
                const firstStart = sched[0].exactStartMs ? getExactMin(sched[0].exactStartMs) : parseHM(sched[0].start);
                if (nowMin < firstStart) {
                    next = sched[0];
                    phase = 'before';
                }
            }
        } else {
            phase = 'finish'; // Empty schedule (e.g., custom not set yet)
        }
    }
    if (phase === 'break' || phase === 'before') {
        if (phase !== 'before') phase = 'break'; 
    }

    // Focus Mode Logic
    const topSection = $('topSection');
    if (state.focusMode && phase === 'exam') {
        topSection.classList.add('focus-active');
    } else {
        topSection.classList.remove('focus-active');
    }

    updateUI(phase, current, next, now);
    renderSchedList(sched, current, next, phase);
  }

  function updateUI(phase, current, next, now) {
    const timerBig = $('timerBig');
    const badge = $('statusBadge');
    const progress = $('progressBar');
    
    if (phase === 'exam') {
      let remainSec, totalSec;
      if (current.exactEndMs) {
          remainSec = Math.max(0, (current.exactEndMs - now.getTime()) / 1000);
          totalSec = (current.exactEndMs - current.exactStartMs) / 1000;
      } else {
          const endSecM = parseHM(current.end) * 60;
          const startSecM = parseHM(current.start) * 60;
          const nowSecM = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
          remainSec = Math.max(0, endSecM - nowSecM);
          totalSec = endSecM - startSecM;
      }
      
      timerBig.textContent = formatSec(remainSec);
      $('currentSubDisplay').textContent = current.name;
      $('currentTimeRange').textContent = `${current.start} ~ ${current.end}`;
      $('quickCountdown').textContent = formatSec(remainSec);
      
      badge.textContent = "測驗中";
      badge.className = "timer-status status-exam";
      $('timerLabel').textContent = "本節剩餘時間";

      const per = (remainSec / totalSec) * 100;
      progress.style.width = per + '%';
      
      if (remainSec < 300) {
        timerBig.classList.add('urgent');
        progress.style.background = 'var(--red)';
      } else {
        timerBig.classList.remove('urgent');
        progress.style.background = 'var(--green)';
      }

    } else if (phase === 'break' || phase === 'before') {
      const target = next;
      let remainSec;
      if (target.exactStartMs) {
          remainSec = Math.max(0, (target.exactStartMs - now.getTime()) / 1000);
      } else {
          const startSecM = parseHM(target.start) * 60;
          const nowSecM = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
          remainSec = Math.max(0, startSecM - nowSecM);
      }

      timerBig.textContent = formatSec(remainSec);
      timerBig.classList.remove('urgent');
      $('currentSubDisplay').textContent = "下科：" + target.name;
      $('currentTimeRange').textContent = `即將於 ${target.start} 開始`;
      $('quickCountdown').textContent = formatSec(remainSec);

      badge.textContent = (phase === 'break') ? "休息時間" : "準備中";
      badge.className = "timer-status status-break";
      $('timerLabel').textContent = "距離下節開始";
      
      progress.style.width = '100%';
      progress.style.background = 'var(--amber)';

    } else {
      timerBig.textContent = "00:00";
      timerBig.classList.remove('urgent');
      
      // Handle Custom Empty State
      const sched = getSchedule();
      if (state.mode === 'custom' && sched.length === 0) {
          $('currentSubDisplay').textContent = "自訂平常考";
          $('currentTimeRange').textContent = "請設定上方的「測驗時間」並點擊開始";
          badge.textContent = "待命設定";
          $('timerLabel').textContent = "等待設定";
      } else {
          $('currentSubDisplay').textContent = "測驗結束";
          $('currentTimeRange').textContent = "本日行程已結束";
          badge.textContent = "完成";
          $('timerLabel').textContent = "計時結束";
      }
      
      $('quickCountdown').textContent = "--";
      badge.className = "timer-status status-finish";
      progress.style.width = '0%';
    }
  }

  function formatSec(s) {
    const min = Math.floor(s/60);
    const sec = Math.floor(s%60);
    return `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  function renderSchedList(sched, current, next, phase) {
    const list = $('schedList');
    list.innerHTML = '';
    
    if (state.mode === 'custom' && sched.length === 0) {
        list.innerHTML = '<div style="padding:20px; color:var(--muted); text-align:center;">目前沒有自訂行程，請從上方新增。</div>';
        return;
    }
    
    sched.forEach(s => {
      const div = document.createElement('div');
      
      let itemClass = 'sched-item';
      if (current && current.name === s.name) {
          itemClass += ' active'; 
      } else if (phase !== 'finish' && next && next.name === s.name) {
          div.style.background = '#fffbeb'; 
      }
      
      const now = new Date();
      let isPast = false;
      if (s.exactEndMs) {
          isPast = now.getTime() >= s.exactEndMs;
      } else {
          const nowMin = now.getHours()*60 + now.getMinutes();
          const endMin = parseHM(s.end);
          isPast = nowMin >= endMin;
      }
      if (isPast) itemClass += ' past';

      div.className = itemClass;
      div.innerHTML = `
        <span class="sched-name">${s.name}</span>
        <span class="sched-time">${s.start} - ${s.end}</span>
      `;
      list.appendChild(div);
    });
  }
  
  // Fullscreen Fix
  $('btnFullscreen').onclick = () => {
    if (!document.fullscreenElement) {
        const docEl = document.documentElement;
        if (docEl.requestFullscreen) docEl.requestFullscreen();
        else if (docEl.mozRequestFullScreen) docEl.mozRequestFullScreen();
        else if (docEl.webkitRequestFullscreen) docEl.webkitRequestFullscreen();
        else if (docEl.msRequestFullscreen) docEl.msRequestFullscreen();
    } else {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        else if (document.msExitFullscreen) document.msExitFullscreen();
    }
  };
</script>
